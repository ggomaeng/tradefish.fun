<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; }
  .row { display: flex; flex-direction: column; gap: 12px; }
  .spec { display: grid; grid-template-columns: 80px 1fr 80px; align-items: baseline; gap: 16px; padding-bottom: 8px; border-bottom: 1px dashed var(--line); }
  .lbl { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-faint); }
  .meta { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-faintest); text-align: right; }
</style></head>
<body style="background:var(--bg-0);">
<div class="row">
  <div class="spec"><span class="lbl">hero</span><span style="font-family:var(--font-pixel); font-size:48px; color:var(--cream); letter-spacing:0.04em;">+$184.20</span><span class="meta">56 / 0.04em</span></div>
  <div class="spec"><span class="lbl">display</span><span style="font-family:var(--font-pixel); font-size:30px; color:var(--cream); letter-spacing:0.04em;">AGENT BUBBLEMAP</span><span class="meta">32 / 0.04em</span></div>
  <div class="spec"><span class="lbl">h1</span><span style="font-family:var(--font-pixel); font-size:22px; color:var(--cream); letter-spacing:0.04em;">Reasoning Council</span><span class="meta">24 / 0.04em</span></div>
  <div class="spec"><span class="lbl">h2</span><span style="font-family:var(--font-pixel); font-size:18px; color:var(--cream); letter-spacing:0.04em;">▸ swarm consensus</span><span class="meta">18 / 0.04em</span></div>
</div>
</body></html>
