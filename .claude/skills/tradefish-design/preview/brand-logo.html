<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-0); display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 24px; }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-faint); width: 110px; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-faintest); margin-left: auto; }

  /* App icon lockup — uses --r-icon (the only soft corner in the system) */
  .app-icon {
    background: #000;
    border-radius: var(--r-icon);
    display: inline-flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 0 1px var(--line);
  }
  .app-icon img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; display: block; }
  .app-icon.ic-128 { width: 128px; height: 128px; }
  .app-icon.ic-72  { width: 72px;  height: 72px; }
  .app-icon.ic-40  { width: 40px;  height: 40px; }
  .app-icon.ic-24  { width: 24px;  height: 24px; }

  .horiz {
    display: inline-flex; align-items: center; gap: 16px;
    padding: 10px 16px;
    background: var(--bg-1);
    border: 1px solid var(--line);
  }
  .horiz img { height: 32px; image-rendering: pixelated; }
  .horiz .word {
    font-family: var(--font-pixel);
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--fg);
  }
  .horiz .word .acc { color: var(--spec-4); }

  .horiz-grad img { height: 32px; image-rendering: pixelated; }
  .horiz-grad .word {
    font-family: var(--font-pixel);
    font-size: 22px;
    letter-spacing: 0.04em;
    background: var(--grad-spectrum);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }

  .stamp {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 12px;
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.4);
  }
  .stamp img { height: 18px; image-rendering: pixelated; }
  .stamp .text { font-family: var(--font-pixel); font-size: 13px; letter-spacing: 0.18em; color: var(--fg); text-transform: uppercase; }

  .ghost {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 8px 14px;
    border: 1px solid var(--line);
    background: var(--bg-1);
  }
  .ghost img { height: 22px; image-rendering: pixelated; filter: grayscale(1) brightness(1.4); opacity: 0.8; }
  .ghost .word { font-family: var(--font-pixel); font-size: 14px; letter-spacing: 0.22em; color: var(--fg-faint); text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <span class="lab">app icon</span>
    <div class="app-icon ic-128"><img src="../assets/tradefish-logo-v2.png" alt=""/></div>
    <div class="app-icon ic-72"><img src="../assets/tradefish-logo-v2.png" alt=""/></div>
    <div class="app-icon ic-40"><img src="../assets/tradefish-logo-v2.png" alt=""/></div>
    <div class="app-icon ic-24"><img src="../assets/tradefish-logo-v2.png" alt=""/></div>
    <span class="meta">128 / 72 / 40 / 24</span>
  </div>

  <div class="row">
    <span class="lab">horizontal</span>
    <div class="horiz"><img src="../assets/tradefish-logo-v2.png" alt=""/><span class="word">trade<span class="acc">Fish</span></span></div>
    <span class="meta">primary product lockup</span>
  </div>

  <div class="row">
    <span class="lab">spectrum</span>
    <div class="horiz horiz-grad" style="background:#000;border-color:var(--line-strong);"><img src="../assets/tradefish-logo-v2.png" alt=""/><span class="word">tradeFish</span></div>
    <span class="meta">hero / brand moment only</span>
  </div>

  <div class="row">
    <span class="lab">stamp</span>
    <div class="stamp"><img src="../assets/tradefish-logo-v2.png" alt=""/><span class="text">tradeFish</span></div>
    <span class="meta">small / nav / footer</span>
  </div>

  <div class="row">
    <span class="lab">monochrome</span>
    <div class="ghost"><img src="../assets/tradefish-logo-v2.png" alt=""/><span class="word">tradeFish</span></div>
    <span class="meta">disabled · footer · print</span>
  </div>
</body></html>
