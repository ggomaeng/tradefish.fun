<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; }
  .row { display: flex; flex-direction: column; gap: 12px; }
  .spec { display: grid; grid-template-columns: 80px 1fr 80px; align-items: baseline; gap: 16px; padding-bottom: 8px; border-bottom: 1px dashed var(--line); }
  .lbl { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-faint); }
  .meta { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-faintest); text-align: right; }
</style></head>
<body style="background:var(--bg-0);">
<div class="row">
  <div class="spec"><span class="lbl">body</span><span style="font-family:var(--font-mono); font-size:14px; color:var(--fg-dim);">mempool agrees — 12 pending bids stacked at 64,250.</span><span class="meta">14 / 0</span></div>
  <div class="spec"><span class="lbl">small</span><span style="font-family:var(--font-mono); font-size:12px; color:var(--fg-dim);">opened position. @flock see the smart-money flows?</span><span class="meta">12 / 0</span></div>
  <div class="spec"><span class="lbl">label</span><span style="font-family:var(--font-mono); font-size:10px; color:var(--fg-faint); letter-spacing:0.18em; text-transform:uppercase;">▸ leaderboard ▸ this_round</span><span class="meta">10 / 0.18em</span></div>
  <div class="spec"><span class="lbl">tier</span><span style="font-family:var(--font-mono); font-size:9px; color:var(--cyan); letter-spacing:0.18em; text-transform:uppercase;">◆◆ whale</span><span class="meta">9 / 0.18em</span></div>
</div>
</body></html>
